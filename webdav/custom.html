                    "Ограничение разрешений: Предоставьте учетной записи WebDAV доступ только к необходимым папкам"
                ],
                warningTitle: "⚠️ Важное примечание",
                warningContent: "При подключении к самостоятельно размещенным серверам убедитесь, что вы доверяете этому серверу. Не вводите конфиденциальные учетные данные на недоверенных серверах.",
                faqTitle: "🔍 Часто задаваемые вопросы",
                faqs: [
                    {
                        q: "Что делать, если подключение не удалось?",
                        a: "Пожалуйста, проверьте:",
                        items: [
                            "Правильность адреса сервера, порта и пути",
                            "Правильность имени пользователя и пароля",
                            "Включена ли функция WebDAV на сервере",
                            "Не блокирует ли брандмауэр подключение",
                            "Используете ли вы HTTP или HTTPS (соответствует конфигурации сервера)"
                        ]
                    },
                    {
                        q: "Что должно быть в корневом пути?",
                        a: "Корневой путь зависит от конфигурации вашего сервера WebDAV.\nОбычные значения включают: /, /webdav, /remote.php/dav/files/USERNAME/ и т.д.\nПожалуйста, обратитесь к документации вашего сервера."
                    },
                    {
                        q: "Можно ли использовать HTTP?",
                        a: "Технически да, но настоятельно не рекомендуется. HTTP не шифруется, ваше имя пользователя и пароль будут передаваться в открытом виде. Используйте HTTP только для тестирования в локальной сети."
                    }
                ],
                refsTitle: "📚 Справочные ресурсы",
                refs: [
                    { text: "📖 Описание протокола WebDAV (Википедия)", url: "https://en.wikipedia.org/wiki/WebDAV" },
                    { text: "🔧 Документация Nextcloud WebDAV", url: "https://docs.nextcloud.com/server/latest/user_manual/en/files/access_webdav.html" },
                    { text: "🔧 Документация ownCloud WebDAV", url: "https://doc.owncloud.com/server/next/user_manual/files/access_webdav.html" }
                ]
            }
        };

        function detectLanguage() {
            const browserLang = navigator.language || navigator.userLanguage;
            const langCode = browserLang.toLowerCase().split('-')[0];
            return translations[langCode] ? langCode : 'en';
        }

        function setActiveLangButton(lang) {
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            const btn = document.querySelector(`.lang-btn[data-lang="${lang}"]`);
            if (btn) btn.classList.add('active');
        }

        function switchLang(lang) {
            const t = translations[lang];
            if (!t) return;

            document.documentElement.lang = lang;
            document.getElementById('title').textContent = t.title;
            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('config-desc-title').textContent = t.configDescTitle;
            document.getElementById('config-desc').textContent = t.configDesc;
            document.getElementById('required-title').textContent = t.requiredTitle;
            document.getElementById('server-label').textContent = t.serverLabel;
            document.getElementById('server-value').textContent = t.serverValue;
            document.getElementById('protocol-label').textContent = t.protocolLabel;
            document.getElementById('protocol-value').textContent = t.protocolValue;
            document.getElementById('port-label').textContent = t.portLabel;
            document.getElementById('port-value').textContent = t.portValue;
            document.getElementById('path-label').textContent = t.pathLabel;
            document.getElementById('path-value').textContent = t.pathValue;
            document.getElementById('username-label').textContent = t.usernameLabel;
            document.getElementById('username-value').textContent = t.usernameValue;
            document.getElementById('password-label').textContent = t.passwordLabel;
            document.getElementById('password-value').textContent = t.passwordValue;
            document.getElementById('examples-title').textContent = t.examplesTitle;
            document.getElementById('security-title').textContent = t.securityTitle;
            document.getElementById('warning-title').textContent = t.warningTitle;
            document.getElementById('warning-content').textContent = t.warningContent;
            document.getElementById('faq-title').textContent = t.faqTitle;
            document.getElementById('refs-title').textContent = t.refsTitle;

            const platformsList = document.getElementById('platforms-list');
            platformsList.innerHTML = '';
            t.platforms.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item;
                platformsList.appendChild(li);
            });

            const examplesContent = document.getElementById('examples-content');
            examplesContent.innerHTML = '';
            t.examples.forEach(example => {
                const h3 = document.createElement('h3');
                h3.textContent = example.name;
                examplesContent.appendChild(h3);
                const ul = document.createElement('ul');
                example.items.forEach(item => {
                    const li = document.createElement('li');
                    li.textContent = item;
                    ul.appendChild(li);
                });
                examplesContent.appendChild(ul);
            });

            const securityList = document.getElementById('security-list');
            securityList.innerHTML = '';
            t.securityItems.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item;
                securityList.appendChild(li);
            });

            const faqContent = document.getElementById('faq-content');
            faqContent.innerHTML = '';
            t.faqs.forEach(faq => {
                const h3 = document.createElement('h3');
                h3.style.fontSize = '1.05rem';
                h3.style.marginBottom = '8px';
                h3.style.color = '#333';
                h3.textContent = faq.q;
                faqContent.appendChild(h3);
                
                const p = document.createElement('p');
                p.className = 'faq-answer';
                p.style.marginBottom = faq.items ? '12px' : '16px';
                p.textContent = faq.a;
                faqContent.appendChild(p);
                
                if (faq.items) {
                    const ul = document.createElement('ul');
                    ul.style.paddingLeft = '20px';
                    ul.style.marginBottom = '16px';
                    faq.items.forEach(item => {
                        const li = document.createElement('li');
                        li.textContent = item;
                        ul.appendChild(li);
                    });
                    faqContent.appendChild(ul);
                }
            });

            const refsList = document.getElementById('refs-list');
            refsList.innerHTML = '';
            t.refs.forEach(ref => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = ref.url;
                a.target = '_blank';
                a.textContent = ref.text;
                li.appendChild(a);
                refsList.appendChild(li);
            });

            setActiveLangButton(lang);
            try {
                localStorage.setItem('preferredLanguage', lang);
            } catch (_) {
                // ignore
            }
        }

        window.onload = function() {
            let savedLang = 'en';
            try {
                savedLang = localStorage.getItem('preferredLanguage') || detectLanguage();
            } catch (_) {
                savedLang = detectLanguage();
            }
            switchLang(savedLang);
        };
    </script>
    <script src="../assets/site-i18n.js"></script>
</body>
</html>
